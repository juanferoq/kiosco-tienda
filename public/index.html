<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Virtual · Mi Tienda</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #06060f; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
#kiosco { width: 100%; max-width: 500px; background: #08080f; border-radius: 28px; border: 1.5px solid #1a1a2e; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(74,108,247,0.08); }
#top-bar { background: #0d0d1a; padding: 16px 22px; border-bottom: 0.5px solid #1a1a2e; display: flex; align-items: center; gap: 12px; }
#store-logo { font-size: 13px; font-weight: 600; color: #9090b0; letter-spacing: 0.12em; text-transform: uppercase; }
#clock { font-size: 12px; color: #44445a; margin-left: auto; }
#online-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-left: 8px; animation: pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
#avatar-section { background: #0d0d1a; padding: 20px 0 16px; display: flex; flex-direction: column; align-items: center; gap: 14px; border-bottom: 0.5px solid #1a1a2e; }
#avatar-container { width: 200px; height: 200px; border-radius: 50%; overflow: hidden; border: 2px solid #2a2a4a; background: #13132a; position: relative; display: flex; align-items: center; justify-content: center; }
#heygen-video { width: 100%; height: 100%; object-fit: cover; display: none; }
#avatar-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
#avatar-frame { width: 150px; height: 170px; position: relative; }
#avatar-body { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 115px; height: 75px; background: #1c3a6e; border-radius: 58px 58px 0 0; }
#avatar-collar { position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%); width: 34px; height: 28px; background: #f5d9c0; border-radius: 0 0 10px 10px; z-index: 2; }
#avatar-tie { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); width: 13px; height: 28px; background: #c0392b; border-radius: 3px 3px 6px 6px; z-index: 3; }
#avatar-head { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 88px; height: 100px; background: #f5d9c0; border-radius: 44px 44px 36px 36px; z-index: 4; }
#avatar-hair { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 90px; height: 48px; background: #2c1a0e; border-radius: 45px 45px 0 0; z-index: 5; }
#hair-l { position: absolute; top: 8px; left: -4px; width: 18px; height: 38px; background: #2c1a0e; border-radius: 10px 0 0 10px; z-index: 5; }
#hair-r { position: absolute; top: 8px; right: -4px; width: 18px; height: 38px; background: #2c1a0e; border-radius: 0 10px 10px 0; z-index: 5; }
#brow-l { position: absolute; top: 36px; left: 13px; width: 20px; height: 4px; background: #2c1a0e; border-radius: 3px; z-index: 7; transform: rotate(-6deg); }
#brow-r { position: absolute; top: 36px; right: 13px; width: 20px; height: 4px; background: #2c1a0e; border-radius: 3px; z-index: 7; transform: rotate(6deg); }
#eye-l, #eye-r { position: absolute; top: 46px; width: 18px; height: 14px; background: white; border-radius: 50%; z-index: 6; overflow: hidden; }
#eye-l { left: 12px; } #eye-r { right: 12px; }
.pupil { width: 9px; height: 9px; background: #1a0e06; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
.eyelid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f5d9c0; border-radius: 50%; transform: scaleY(0); transform-origin: top; transition: transform 0.08s; }
.eyelid.blink { transform: scaleY(1); }
#ear-l { position: absolute; top: 48px; left: -6px; width: 13px; height: 20px; background: #f5d9c0; border-radius: 50%; z-index: 3; }
#ear-r { position: absolute; top: 48px; right: -6px; width: 13px; height: 20px; background: #f5d9c0; border-radius: 50%; z-index: 3; }
#nose { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 10px; height: 12px; z-index: 6; }
#nose::before, #nose::after { content:''; position:absolute; bottom:0; width:7px; height:5px; border-radius:50%; background:#e0b898; }
#nose::before{left:0;} #nose::after{right:0;}
#mouth { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 30px; height: 15px; z-index: 6; }
#upper-lip { position: absolute; top: 0; width: 100%; height: 6px; background: #c07040; border-radius: 6px 6px 0 0; }
#lower-lip { position: absolute; bottom: 0; width: 100%; height: 8px; background: #c07040; border-radius: 0 0 8px 8px; transition: transform 0.1s ease; transform-origin: top; }
#mouth-inner { position: absolute; top: 5px; left: 2px; width: 26px; height: 4px; background: #7a1a1a; border-radius: 2px; transition: height 0.1s ease; overflow: hidden; }
#teeth { width: 100%; height: 100%; background: #f0efe6; border-radius: 2px; }
#avatar-status { display: flex; align-items: center; gap: 10px; }
#wave-mini { display: flex; align-items: center; gap: 3px; height: 18px; }
.wmbar { width: 3px; border-radius: 2px; background: #4a6cf7; height: 4px; }
.wmbar.idle { animation: wmid 2s infinite ease-in-out; }
.wmbar:nth-child(2).idle{animation-delay:0.2s;}.wmbar:nth-child(3).idle{animation-delay:0.4s;}.wmbar:nth-child(4).idle{animation-delay:0.6s;}.wmbar:nth-child(5).idle{animation-delay:0.8s;}
@keyframes wmid{0%,100%{height:3px;}50%{height:9px;}}
.wmbar.speaking { animation: wmspk 0.4s infinite ease-in-out; }
.wmbar:nth-child(2).speaking{animation-delay:0.08s;}.wmbar:nth-child(3).speaking{animation-delay:0.16s;}.wmbar:nth-child(4).speaking{animation-delay:0.24s;}.wmbar:nth-child(5).speaking{animation-delay:0.32s;}
@keyframes wmspk{0%,100%{height:3px;}50%{height:16px;}}
.wmbar.listening { animation: wmlsn 0.3s infinite ease-in-out; background: #f7c355; }
.wmbar:nth-child(2).listening{animation-delay:0.06s;}.wmbar:nth-child(3).listening{animation-delay:0.12s;}.wmbar:nth-child(4).listening{animation-delay:0.18s;}.wmbar:nth-child(5).listening{animation-delay:0.24s;}
@keyframes wmlsn{0%,100%{height:4px;}50%{height:14px;}}
#status-label { font-size: 12px; color: #6666aa; }
#chat-area { max-height: 220px; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 9px; }
#chat-area::-webkit-scrollbar{width:3px;}
#chat-area::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px;}
.kmsg { display: flex; gap: 7px; align-items: flex-end; }
.kmsg.user { flex-direction: row-reverse; }
.kbubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; max-width: 80%; white-space: pre-line; }
.bot .kbubble { background: #13132a; border: 0.5px solid #2a2a4a; color: #c8c8e8; border-bottom-left-radius: 3px; }
.user .kbubble { background: #4a6cf7; color: #fff; border-bottom-right-radius: 3px; }
.kav { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.bot .kav { background: #1e1e3a; color: #8888bb; }
.user .kav { background: #2a3a8a; color: #aabbff; }
.typing-bub { display:flex;align-items:center;gap:5px;padding:10px 14px;background:#13132a;border:0.5px solid #2a2a4a;border-radius:16px;border-bottom-left-radius:3px; }
.tdot{width:6px;height:6px;border-radius:50%;background:#555570;animation:tblink 1.2s infinite;}
.tdot:nth-child(2){animation-delay:0.2s;}.tdot:nth-child(3){animation-delay:0.4s;}
@keyframes tblink{0%,80%,100%{opacity:0.2;}40%{opacity:1;}}
#chips-row { display: flex; flex-wrap: wrap; gap: 7px; padding: 0 16px 12px; }
.kchip { padding: 8px 14px; border-radius: 20px; border: 0.5px solid #2a2a4a; font-size: 12px; cursor: pointer; background: #0d0d1a; color: #7777aa; transition: all 0.15s; user-select: none; }
.kchip:hover { background: #1e1e3a; color: #c8c8e8; border-color: #4a4a7a; }
#bottom-bar { background: #0d0d1a; border-top: 0.5px solid #1a1a2e; padding: 14px 18px; display: flex; gap: 10px; align-items: center; }
#k-input { flex: 1; padding: 12px 16px; border-radius: 25px; border: 0.5px solid #2a2a4a; background: #13132a; color: #c8c8e8; font-size: 14px; font-family: inherit; outline: none; }
#k-input::placeholder { color: #44445a; }
#k-input:focus { border-color: #4a6cf7; }
#k-mic { width: 46px; height: 46px; border-radius: 50%; border: 0.5px solid #2a2a4a; background: #13132a; color: #8888bb; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
#k-mic.listening { border-color: #f7c355; background: #1a1a08; color: #f7c355; }
#k-send { width: 46px; height: 46px; border-radius: 50%; border: none; background: #4a6cf7; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#k-send:disabled { opacity: 0.4; cursor: not-allowed; }
#mic-hint { text-align: center; font-size: 11px; color: #333350; padding: 0 18px 12px; }
#loading-overlay { display: none; position: absolute; inset: 0; background: rgba(8,8,15,0.7); border-radius: 50%; align-items: center; justify-content: center; z-index: 10; }
#loading-overlay.show { display: flex; }
#loading-spinner { width: 30px; height: 30px; border: 2px solid #2a2a4a; border-top-color: #4a6cf7; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="kiosco">
  <div id="top-bar">
    <div style="width:32px;height:32px;border-radius:8px;background:#1e1e3a;display:flex;align-items:center;justify-content:center;font-size:16px;">🏪</div>
    <div id="store-logo">Mi Tienda</div>
    <div id="clock">--:--</div>
    <div id="online-dot"></div>
  </div>

  <div id="avatar-section">
    <div id="avatar-container">
      <video id="heygen-video" autoplay playsinline></video>
      <div id="avatar-fallback">
        <div id="avatar-frame">
          <div id="avatar-body"></div>
          <div id="avatar-collar"></div>
          <div id="avatar-tie"></div>
          <div id="avatar-head">
            <div id="avatar-hair"></div>
            <div id="hair-l"></div>
            <div id="hair-r"></div>
            <div id="ear-l"></div>
            <div id="ear-r"></div>
            <div id="brow-l"></div>
            <div id="brow-r"></div>
            <div id="eye-l"><div class="pupil"></div><div class="eyelid" id="lid-l"></div></div>
            <div id="eye-r"><div class="pupil"></div><div class="eyelid" id="lid-r"></div></div>
            <div id="nose"></div>
            <div id="mouth">
              <div id="upper-lip"></div>
              <div id="mouth-inner"><div id="teeth"></div></div>
              <div id="lower-lip"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="loading-overlay"><div id="loading-spinner"></div></div>
    </div>
    <div id="avatar-status">
      <div id="wave-mini">
        <div class="wmbar idle"></div><div class="wmbar idle"></div>
        <div class="wmbar idle"></div><div class="wmbar idle"></div>
        <div class="wmbar idle"></div>
      </div>
      <span id="status-label">Asistente · En línea</span>
    </div>
  </div>

  <div id="chat-area">
    <div class="kmsg bot">
      <div class="kav">A</div>
      <div class="kbubble">¡Hola! Bienvenido a Mi Tienda. Soy tu asistente virtual. ¿En qué te puedo ayudar hoy? 👋</div>
    </div>
  </div>

  <div id="chips-row">
    <div class="kchip" onclick="sendChip('¿Qué productos tienen?')">¿Qué tienen?</div>
    <div class="kchip" onclick="sendChip('¿Cuánto cuesta la chaqueta negra?')">Precio chaqueta</div>
    <div class="kchip" onclick="sendChip('¿Tienen tallas grandes?')">Tallas grandes</div>
    <div class="kchip" onclick="sendChip('¿Cuáles son sus horarios?')">Horarios</div>
    <div class="kchip" onclick="sendChip('¿Cómo puedo pagar?')">Formas de pago</div>
    <div class="kchip" onclick="sendChip('¿Dónde están ubicados?')">Ubicación</div>
  </div>

  <div id="bottom-bar">
    <input id="k-input" type="text" placeholder="Toca aquí y escribe tu pregunta..." onkeydown="if(event.key==='Enter')sendMsg()" />
    <button id="k-mic" onclick="toggleMic()">🎤</button>
    <button id="k-send" onclick="sendMsg()">&#10148;</button>
  </div>
  <div id="mic-hint">🎤 Presiona el micrófono y habla en español</div>
</div>

<script>
// ── Sistema de respaldo ──────────────────────────────────────
const productos = [
  { nombre: "camisa blanca", precio: "$89.900", tallas: "S, M, L, XL", stock: "disponible", desc: "100% algodón, cuello redondo" },
  { nombre: "jean azul clásico", precio: "$159.900", tallas: "28 al 38", stock: "disponible", desc: "corte recto, denim premium" },
  { nombre: "vestido floral", precio: "$129.900", tallas: "XS, S, M, L", stock: "últimas unidades", desc: "tela liviana, ideal para verano" },
  { nombre: "chaqueta negra", precio: "$249.900", tallas: "S, M, L", stock: "disponible", desc: "material sintético, impermeable" },
  { nombre: "tenis deportivos", precio: "$189.900", tallas: "35 al 44", stock: "disponible", desc: "suela antideslizante" },
  { nombre: "bolso de cuero", precio: "$219.900", tallas: "talla única", stock: "pocas unidades", desc: "cuero genuino, varios colores" }
];

const SYSTEM_PROMPT = `Eres el asistente virtual de una tienda de ropa en Medellín, Colombia.
Responde siempre en español, de forma amable, breve y directa (máximo 3 oraciones).
Solo usa esta información:

PRODUCTOS:
- Camisa blanca: $89.900 COP | Tallas: S, M, L, XL | Disponible | 100% algodón
- Jean azul clásico: $159.900 COP | Tallas: 28-38 | Disponible | Denim premium
- Vestido floral: $129.900 COP | Tallas: XS, S, M, L | Últimas unidades | Tela liviana
- Chaqueta negra: $249.900 COP | Tallas: S, M, L | Disponible | Impermeable
- Tenis deportivos: $189.900 COP | Tallas: 35-44 | Disponible | Suela antideslizante
- Bolso de cuero: $219.900 COP | Talla única | Pocas unidades | Cuero genuino

TIENDA:
- Horario: Lunes-sábado 10am-8pm, domingos 11am-6pm
- Ubicación: Centro Comercial El Tesoro, Medellín
- Pagos: Efectivo, tarjeta débito/crédito, Nequi, Daviplata`;

let conversationHistory = [];
let mouthInterval = null;

// ── Avatar ───────────────────────────────────────────────────
function setWave(mode){ document.querySelectorAll('.wmbar').forEach(b=>b.className='wmbar '+mode); }
function startMouth(){
  const lower=document.getElementById('lower-lip'), inner=document.getElementById('mouth-inner');
  let open=false;
  mouthInterval=setInterval(()=>{ open=!open; lower.style.transform=open?'scaleY(1.6) translateY(3px)':'scaleY(1)'; inner.style.height=open?'8px':'4px'; },160);
}
function stopMouth(){
  clearInterval(mouthInterval);
  const lower=document.getElementById('lower-lip'), inner=document.getElementById('mouth-inner');
  if(lower)lower.style.transform='scaleY(1)'; if(inner)inner.style.height='4px';
}
function setAvatarState(state){
  setWave(state==='thinking'?'idle':state);
  const lbl=document.getElementById('status-label');
  if(state==='speaking'){lbl.textContent='Hablando...';}
  else if(state==='listening'){lbl.textContent='Escuchando...';stopMouth();}
  else if(state==='thinking'){lbl.textContent='Pensando...';}
  else{lbl.textContent='Asistente · En línea';stopMouth();}
}
function showLoading(show){ document.getElementById('loading-overlay').className=show?'show':''; }
function doBlink(){
  ['lid-l','lid-r'].forEach(id=>{ const el=document.getElementById(id); if(el){el.classList.add('blink');setTimeout(()=>el.classList.remove('blink'),120);} });
  setTimeout(doBlink,2200+Math.random()*3000);
}

// ── Flujo completo via backend ───────────────────────────────
async function processMessage(userText){
  setAvatarState('thinking'); showLoading(true);
  try {
    // 1. Claude
    conversationHistory.push({role:'user',content:userText});
    const claudeRes = await fetch('/api/claude', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({messages: conversationHistory, system: SYSTEM_PROMPT})
    });
    const claudeData = await claudeRes.json();
    const replyText = claudeData.content?.[0]?.text || 'Lo siento, no pude responder.';
    conversationHistory.push({role:'assistant',content:replyText});
    addMsg(replyText,'bot');

    // 2. ElevenLabs TTS
    const ttsRes = await fetch('/api/tts', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text: replyText.replace(/[•*\n]/g,' ').replace(/\s+/g,' ').trim()})
    });
    const audioBlob = await ttsRes.blob();
    const audioBase64 = await blobToBase64(audioBlob);
    const audioUrl = URL.createObjectURL(audioBlob);

    // 3. HeyGen video
    const heygenRes = await fetch('/api/heygen/generate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({audioBase64: audioBase64.split(',')[1]})
    });
    const heygenData = await heygenRes.json();
    const videoId = heygenData.data?.video_id;

    showLoading(false);

    if(videoId){
      // Esperar el video
      setAvatarState('speaking'); startMouth();
      const videoUrl = await pollHeyGen(videoId);
      if(videoUrl){ showHeyGenVideo(videoUrl, audioUrl); }
      else { playAudio(audioUrl); }
    } else {
      playAudio(audioUrl);
    }
  } catch(err){
    console.error(err);
    showLoading(false);
    // Fallback simulado
    const reply = responderSimulado(userText);
    addMsg(reply,'bot'); speakFallback(reply);
  }
}

async function pollHeyGen(videoId){
  for(let i=0;i<20;i++){
    await new Promise(r=>setTimeout(r,3000));
    const res = await fetch(`/api/heygen/status/${videoId}`);
    const data = await res.json();
    if(data.data?.status==='completed') return data.data.video_url;
  }
  return null;
}

function showHeyGenVideo(videoUrl, audioUrl){
  const video=document.getElementById('heygen-video');
  const fallback=document.getElementById('avatar-fallback');
  video.src=videoUrl; video.style.display='block'; fallback.style.display='none';
  setAvatarState('speaking');
  video.onended=()=>{ video.style.display='none'; fallback.style.display='flex'; setAvatarState('idle'); stopMouth(); };
}

function playAudio(audioUrl){
  const audio=new Audio(audioUrl);
  setAvatarState('speaking'); startMouth();
  audio.onended=()=>{setAvatarState('idle');stopMouth();};
  audio.play();
}

function blobToBase64(blob){
  return new Promise(resolve=>{ const r=new FileReader(); r.onload=()=>resolve(r.result); r.readAsDataURL(blob); });
}

// ── Fallback simulado ────────────────────────────────────────
function normalize(t){return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[¿?¡!]/g,"");}
function buscar(q){return productos.filter(p=>p.nombre.split(" ").some(k=>k.length>2&&q.includes(k)));}
function responderSimulado(preg){
  const q=normalize(preg);
  if(q.includes("hola")||q.includes("buenas")) return "¡Hola! Bienvenido. ¿En qué te puedo ayudar?";
  if(q.includes("horario")||q.includes("hora")) return "Lunes a sábado: 10am–8pm\nDomingos: 11am–6pm";
  if(q.includes("pago")||q.includes("nequi")||q.includes("tarjeta")||q.includes("efectivo")) return "Aceptamos efectivo, tarjeta débito/crédito, Nequi y Daviplata.";
  if(q.includes("donde")||q.includes("ubicacion")||q.includes("tesoro")) return "Estamos en el Centro Comercial El Tesoro, Medellín.";
  if((q.includes("productos")||q.includes("tienen"))&&!buscar(q).length)
    return "Nuestros productos:\n"+productos.map(p=>`• ${p.nombre.charAt(0).toUpperCase()+p.nombre.slice(1)}: ${p.precio}`).join("\n");
  const f=buscar(q);
  if(f.length) return f.map(p=>`${p.nombre.charAt(0).toUpperCase()+p.nombre.slice(1)}\n• Precio: ${p.precio}\n• Tallas: ${p.tallas}`).join("\n\n");
  return "No tengo esa información. Puedo ayudarte con precios, tallas, horarios y pagos.";
}
function speakFallback(text){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text.replace(/[•*\n]/g,' ').trim());
  u.lang='es-CO'; u.rate=1.05;
  const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('es'));
  if(v)u.voice=v;
  u.onstart=()=>{setAvatarState('speaking');startMouth();};
  u.onend=u.onerror=()=>{setAvatarState('idle');stopMouth();};
  window.speechSynthesis.speak(u);
}

// ── Chat UI ──────────────────────────────────────────────────
function addMsg(text,who){
  const area=document.getElementById('chat-area');
  const div=document.createElement('div'); div.className='kmsg '+who;
  const av=document.createElement('div'); av.className='kav'; av.textContent=who==='bot'?'A':'Tú';
  const bub=document.createElement('div'); bub.className='kbubble'; bub.textContent=text;
  if(who==='bot'){div.appendChild(av);div.appendChild(bub);}else{div.appendChild(bub);div.appendChild(av);}
  area.appendChild(div); area.scrollTop=area.scrollHeight;
}
function showTyping(){
  const area=document.getElementById('chat-area');
  const div=document.createElement('div'); div.className='kmsg bot'; div.id='ktyping';
  const av=document.createElement('div'); av.className='kav'; av.textContent='A';
  const bub=document.createElement('div'); bub.className='typing-bub';
  bub.innerHTML='<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>';
  div.appendChild(av); div.appendChild(bub); area.appendChild(div); area.scrollTop=area.scrollHeight;
}
function removeTyping(){const t=document.getElementById('ktyping');if(t)t.remove();}
function sendChip(t){document.getElementById('k-input').value=t;sendMsg();}
function sendMsg(){
  const input=document.getElementById('k-input'), btn=document.getElementById('k-send');
  const text=input.value.trim(); if(!text)return;
  input.value=''; btn.disabled=true;
  addMsg(text,'user'); showTyping();
  setTimeout(()=>{ removeTyping(); processMessage(text).finally(()=>{btn.disabled=false;input.focus();}); },300);
}

// ── Micrófono ────────────────────────────────────────────────
let recognition=null, isListening=false;
function toggleMic(){
  if(isListening){recognition&&recognition.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Usa Google Chrome para el micrófono.');return;}
  recognition=new SR(); recognition.lang='es-CO'; recognition.interimResults=false;
  recognition.onstart=()=>{isListening=true;setAvatarState('listening');document.getElementById('k-mic').classList.add('listening');document.getElementById('k-mic').textContent='⏹';document.getElementById('k-input').placeholder='Escuchando...';};
  recognition.onresult=(e)=>{document.getElementById('k-input').value=e.results[0][0].transcript;sendMsg();};
  recognition.onerror=recognition.onend=()=>{isListening=false;setAvatarState('idle');document.getElementById('k-mic').classList.remove('listening');document.getElementById('k-mic').textContent='🎤';document.getElementById('k-input').placeholder='Toca aquí y escribe tu pregunta...';};
  recognition.start();
}

// ── Init ─────────────────────────────────────────────────────
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});}
updateClock(); setInterval(updateClock,30000);
setTimeout(doBlink,1800);
window.speechSynthesis.onvoiceschanged=()=>{};
setTimeout(()=>window.speechSynthesis.getVoices(),200);
</script>
